<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shastraprathista</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Your existing CSS remains the same */
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
      border: 1px solid #c3e6cb;
    }
    .signup-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .signup-link a {
      color: #007bff;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    .guest-option {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #666;
    }
    .guest-option a {
      color: #007bff;
      text-decoration: none;
    }
    .guest-option a:hover {
      text-decoration: underline;
    }

    .forgot-password {
      text-align: center;
      margin: 15px 0;
      font-size: 14px;
    }

    .forgot-password a {
      color: #007bff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .forgot-password a:hover {
      color: #0056b3;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Welcome Back</h2>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email Address" 
              autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Password" 
              autocomplete="current-password" required>
      </div>

      <button type="submit" id="loginBtn">Login</button>
    </form>
    
    <div class="form-group" style="text-align: center; margin: 15px 0;">
      <div style="color: #666; margin-bottom: 10px;">Or</div>
      <button type="button" onclick="showOTPLogin()" style="background: #28a745; width: 100%; padding: 12px 20px; margin-top: 10px;">
        Login with OTP
      </button>
    </div>

    <div id="otpLoginSection" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
      <!-- Back to Login Button -->
      <div style="text-align: center; margin-bottom: 15px;">
        <button type="button" onclick="hideOTPLogin()" style="background: #6c757d; width: auto; padding: 5px 15px; font-size: 14px; margin-bottom: 10px;">
          ← Back to Password Login
        </button>
      </div>
      
      <form onsubmit="sendLoginOTP(event); return false;">
        <div class="form-group">
          <input type="email" id="otpLoginInput" placeholder="Enter your email address" 
                autocomplete="email" required>
        </div>

        <button type="submit" id="sendLoginOtpBtn">Send OTP</button>
      </form>

      <div id="otpVerificationSection" style="display: none; margin-top: 15px;">
        <form onsubmit="verifyLoginOTP(event); return false;">
          <div class="form-group">
            <input type="text" id="loginOtp" placeholder="Enter 6-digit OTP" 
                  maxlength="6" autocomplete="one-time-code" required>
          </div>
          <div id="loginTimer" style="text-align: center; color: #e74c3c; font-weight: bold; margin: 10px 0;">10:00</div>
          <button type="submit" id="verifyLoginOtpBtn">Verify OTP</button>
        </form>
        <div style="text-align: center; margin-top: 10px;">
          <button type="button" onclick="resendLoginOTP()" id="resendLoginOtpBtn" style="background: #6c757d; padding: 5px 15px; font-size: 14px;" disabled>
            Resend OTP (60s)
          </button>
        </div>
      </div>
    </div>

    <div class="forgot-password">
      <a href="forgot-password-otp.html" style="font-size: 14px; color: #007bff; text-decoration: none;">
        Forgot your password?
      </a>
    </div>
    
    <div class="error" id="loginError"></div>
    <div class="success" id="loginSuccess"></div>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
    
    <div class="guest-option">
      Or <a href="all_book_grid.html">continue as guest</a>
    </div>
  </div>

  <script>
      // ================================
      // DYNAMIC BASE URL CONFIGURATION
      // ================================
      window.API_BASE_URL = window.location.origin;
      
      // ================================
      // IMPROVED API CALL FUNCTION
      // ================================
      async function apiCall(endpoint, options = {}) {
          // Use relative path (works on same origin)
          const url = `/api${endpoint}`;
          
          console.log(`📡 API Call: ${url}`, options);
          
          try {
              const response = await fetch(url, {
                  ...options,
                  headers: {
                      'Content-Type': 'application/json',
                      ...(options.headers || {})
                  }
              });
              
              console.log(`📡 Response Status: ${response.status}`);
              
              if (!response.ok) {
                  const errorText = await response.text();
                  console.error(`📡 Error Response:`, errorText);
                  
                  try {
                      // Try to parse as JSON for better error message
                      const errorJson = JSON.parse(errorText);
                      throw new Error(errorJson.message || errorJson.error || `HTTP ${response.status}`);
                  } catch (e) {
                      throw new Error(errorText || `HTTP ${response.status}`);
                  }
              }
              
              const data = await response.json();
              console.log(`📡 Success Response:`, data);
              return data;
              
          } catch (error) {
              console.error('❌ API Error:', error);
              throw error;
          }
      }

      let loginTimeout;
      let loginOtpTimer;
      let loginTimeLeft = 600;
      let loginResendTimer;
      let loginResendTimeLeft = 60;
      let otpLoginEmail = '';

      function showOTPLogin() {
        // Show OTP section
        document.getElementById('otpLoginSection').style.display = 'block';
        
        // Hide regular login form
        document.getElementById('loginForm').style.display = 'none';
        
        // Also hide the "Or" section and forgot password link
        document.querySelector('.form-group[style*="text-align: center"]').style.display = 'none';
        document.querySelector('.forgot-password').style.display = 'none';
      }

      function hideOTPLogin() {
        // Hide OTP section
        document.getElementById('otpLoginSection').style.display = 'none';
        document.getElementById('otpVerificationSection').style.display = 'none';
        
        // Show regular login form
        document.getElementById('loginForm').style.display = 'block';
        
        // Show the "Or" section and forgot password link
        document.querySelector('.form-group[style*="text-align: center"]').style.display = 'block';
        document.querySelector('.forgot-password').style.display = 'block';
        
        // Reset OTP fields and clear timers
        document.getElementById('otpLoginInput').value = '';
        document.getElementById('loginOtp').value = '';
        
        // Clear timers
        if (loginOtpTimer) clearInterval(loginOtpTimer);
        if (loginResendTimer) clearInterval(loginResendTimer);
        
        hideMessage(document.getElementById('loginError'));
        hideMessage(document.getElementById('loginSuccess'));
      }

      async function sendLoginOTP(event) {  // Add event parameter
        if (event) event.preventDefault();  // Add this line
        
        const email = document.getElementById('otpLoginInput').value.trim();

        if (!email) {
          showError('Please enter your email address.');
          return;
        }

        // Email validation
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        try {
          const sendLoginOtpBtn = document.getElementById('sendLoginOtpBtn');
          sendLoginOtpBtn.disabled = true;
          sendLoginOtpBtn.textContent = 'Sending OTP...';

          // FIXED: Use apiCall function, remove duplicate declaration
          const result = await apiCall('/auth/send-login-otp', {
              method: 'POST',
              body: JSON.stringify({ email })
          });

          if (result.success) {
            otpLoginEmail = email;
            document.getElementById('otpVerificationSection').style.display = 'block';
            startLoginOTPTimer();
            startLoginResendTimer();
            showSuccess('OTP sent to your email successfully!');
          } else {
            showError(result.message);
          }
        } catch (error) {
          console.error('Send login OTP error:', error);
          showError('Error sending OTP. Please try again.');
        } finally {
          const sendLoginOtpBtn = document.getElementById('sendLoginOtpBtn');
          sendLoginOtpBtn.disabled = false;
          sendLoginOtpBtn.textContent = 'Send OTP';
        }
      }

      async function verifyLoginOTP(event) {  // Add event parameter
        if (event) event.preventDefault();  // Add this line
        
        const otp = document.getElementById('loginOtp').value.trim();

        if (!otp || otp.length !== 6) {
          showError('Please enter a valid 6-digit OTP.');
          return;
        }

        try {
          const verifyLoginOtpBtn = document.getElementById('verifyLoginOtpBtn');
          verifyLoginOtpBtn.disabled = true;
          verifyLoginOtpBtn.textContent = 'Verifying...';

          // FIXED: Use apiCall function, remove duplicate declaration
          const result = await apiCall('/auth/verify-login-otp', {
              method: 'POST',
              body: JSON.stringify({ 
                  email: otpLoginEmail,
                  otp: otp 
              })
          });

          if (result.success) {
            showSuccess('Login successful! Redirecting...');

            // Save token and user data
            localStorage.setItem('token', result.token);
            localStorage.setItem('currentUser', JSON.stringify(result.user));

            // Set auto-logout timer
            if (window.loginTimeout) clearTimeout(window.loginTimeout);
            window.loginTimeout = setTimeout(() => {
              localStorage.removeItem('token');
              localStorage.removeItem('currentUser');
              alert('Session expired. Please login again.');
              window.location.href = 'login.html';
            }, 10 * 60 * 1000);

            // Redirect based on role
            setTimeout(() => {
              if (result.user.role === 'admin') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'all_book_grid.html';
              }
            }, 1000);
          } else {
            showError(result.message);
          }
        } catch (error) {
          console.error('Verify login OTP error:', error);
          showError('Error verifying OTP. Please try again.');
        } finally {
          const verifyLoginOtpBtn = document.getElementById('verifyLoginOtpBtn');
          verifyLoginOtpBtn.disabled = false;
          verifyLoginOtpBtn.textContent = 'Verify OTP';
        }
      }

      async function resendLoginOTP() {
        try {
          const resendLoginOtpBtn = document.getElementById('resendLoginOtpBtn');
          resendLoginOtpBtn.disabled = true;
          resendLoginOtpBtn.textContent = 'Resending...';

          // FIXED: Use apiCall function, remove duplicate declaration
          const result = await apiCall('/auth/send-login-otp', {
              method: 'POST',
              body: JSON.stringify({ email: otpLoginEmail })
          });

          if (result.success) {
            showSuccess('OTP resent successfully!');
            clearInterval(loginOtpTimer);
            clearInterval(loginResendTimer);
            loginTimeLeft = 600;
            loginResendTimeLeft = 60;
            startLoginOTPTimer();
            startLoginResendTimer();
          } else {
            showError(result.message);
          }
        } catch (error) {
          console.error('Resend login OTP error:', error);
          showError('Error resending OTP. Please try again.');
        }
      }

      function startLoginOTPTimer() {
        updateLoginTimerDisplay();
        
        loginOtpTimer = setInterval(() => {
          loginTimeLeft--;
          updateLoginTimerDisplay();
          
          if (loginTimeLeft <= 0) {
            clearInterval(loginOtpTimer);
            showError('OTP has expired. Please request a new one.');
          }
        }, 1000);
      }

      function startLoginResendTimer() {
        const resendLoginOtpBtn = document.getElementById('resendLoginOtpBtn');
        resendLoginOtpBtn.disabled = true;
        resendLoginOtpBtn.textContent = `Resend OTP (${loginResendTimeLeft}s)`;
        
        loginResendTimer = setInterval(() => {
          loginResendTimeLeft--;
          resendLoginOtpBtn.textContent = `Resend OTP (${loginResendTimeLeft}s)`;
    
          if (loginResendTimeLeft <= 0) {
            clearInterval(loginResendTimer);
            resendLoginOtpBtn.disabled = false;
            resendLoginOtpBtn.textContent = 'Resend OTP';
          }
        }, 1000);
      }

      function updateLoginTimerDisplay() {
        const minutes = Math.floor(loginTimeLeft / 60);
        const seconds = loginTimeLeft % 60;
        document.getElementById('loginTimer').textContent = 
          `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }

      // ✅ Auto redirect if user already logged in
      document.addEventListener('DOMContentLoaded', function() {
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
          try {
            const parsed = JSON.parse(currentUser);
            if (parsed.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'all_book_grid.html';
            }
          } catch (e) {
            console.error('Error parsing user data:', e);
            localStorage.removeItem('currentUser');
            localStorage.removeItem('token');
          }
        }
      });

      async function handleLogin(event) {
        if (event) event.preventDefault(); // Prevent default form submission
        
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorMsg = document.getElementById('loginError');
        const successMsg = document.getElementById('loginSuccess');
        const loginBtn = document.getElementById('loginBtn');

        // Reset messages
        hideMessage(errorMsg);
        hideMessage(successMsg);

        // Validation
        if (!email || !password) {
          showError('Please enter both email and password.');
          return;
        }

        // Email validation
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        try {
          // Disable button and show loading
          loginBtn.disabled = true;
          loginBtn.textContent = 'Logging in...';

          console.log('🔍 Attempting login for:', email);
          
          const data = await apiCall('/auth/login', {
              method: 'POST',
              body: JSON.stringify({ email, password })
          });

          console.log('🔍 Login response:', data);

          // ✅ Save token and user info
          if (data.token && data.user) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));

            console.log('🔍 Token saved:', data.token.substring(0, 50) + '...');
            console.log('🔍 User saved:', data.user);

            // ✅ AUTO-LOGOUT TIMEOUT
            if (window.loginTimeout) clearTimeout(window.loginTimeout);

            window.loginTimeout = setTimeout(() => {
              localStorage.removeItem('token');
              localStorage.removeItem('currentUser');
              alert('Session expired. Please login again.');
              window.location.href = 'login.html';
            }, 10 * 60 * 1000);

            showSuccess('Login successful! Redirecting...');

            // Redirect based on role
            setTimeout(() => {
              if (data.user.role === 'admin') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'all_book_grid.html';
              }
            }, 1000);
          } else {
            console.error('❌ Invalid response structure:', data);
            throw new Error('Invalid response from server');
          }

        } catch (err) {
          console.error('❌ Login error details:', {
            name: err.name,
            message: err.message,
            stack: err.stack
          });

          // Specific error messages for common issues
          if (err.message.includes('network') || err.message.includes('fetch')) {
            showError('Network error. Please check your connection.');
          } else if (err.message.includes('password') || err.message.includes('credentials')) {
            showError('Invalid email or password.');
          } else if (err.message.includes('no password set')) {
            showError('This account has no password set. Please sign up again or use password reset.');
          } else {
            showError(err.message || 'Something went wrong. Please try again.');
          }
        } finally {
          // Re-enable button
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      }

      function showError(message) {
        const errorMsg = document.getElementById('loginError');
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        // Auto-hide error after 5 seconds
        setTimeout(() => hideMessage(errorMsg), 5000);
      }

      function showSuccess(message) {
        const successMsg = document.getElementById('loginSuccess');
        successMsg.textContent = message;
        successMsg.style.display = 'block';
      }

      function hideMessage(element) {
        if (element) {
          element.style.display = 'none';
          element.textContent = '';
        }
      }

      // Clear error when user starts typing
      document.getElementById('loginEmail').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });
      
      document.getElementById('loginPassword').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });

      document.getElementById('otpLoginInput').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });

      document.getElementById('loginOtp').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });
  </script>

</body>
</html>
