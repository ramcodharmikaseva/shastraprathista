<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shastraprathista</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
      border: 1px solid #c3e6cb;
    }
    .signup-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .signup-link a {
      color: #007bff;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    .guest-option {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #666;
    }
    .guest-option a {
      color: #007bff;
      text-decoration: none;
    }
    .guest-option a:hover {
      text-decoration: underline;
    }

    .forgot-password {
      text-align: center;
      margin: 15px 0;
      font-size: 14px;
    }

    .forgot-password a {
      color: #007bff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .forgot-password a:hover {
      color: #0056b3;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Welcome Back</h2>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email Address" 
              autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Password" 
              autocomplete="current-password" required>
      </div>

      <button type="submit" id="loginBtn">Login</button>
    </form>

    <div class="forgot-password">
      <a href="forgot-password.html" style="font-size: 14px; color: #007bff; text-decoration: none;">
        Forgot your password?
      </a>
    </div>
    
    <div class="error" id="loginError"></div>
    <div class="success" id="loginSuccess"></div>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
    
    <div class="guest-option">
      Or <a href="all_book_grid.html">continue as guest</a>
    </div>
  </div>

  <script>
      // ================================
      // DYNAMIC BASE URL CONFIGURATION
      // ================================
      window.API_BASE_URL = window.location.origin;
      
      // ================================
      // IMPROVED API CALL FUNCTION
      // ================================
      async function apiCall(endpoint, options = {}) {
          // Use relative path (works on same origin)
          const url = `/api${endpoint}`;
          
          console.log(`📡 API Call: ${url}`, options);
          
          try {
              const response = await fetch(url, {
                  ...options,
                  headers: {
                      'Content-Type': 'application/json',
                      ...(options.headers || {})
                  }
              });
              
              console.log(`📡 Response Status: ${response.status}`);
              
              if (!response.ok) {
                  const errorText = await response.text();
                  console.error(`📡 Error Response:`, errorText);
                  
                  try {
                      // Try to parse as JSON for better error message
                      const errorJson = JSON.parse(errorText);
                      throw new Error(errorJson.message || errorJson.error || `HTTP ${response.status}`);
                  } catch (e) {
                      throw new Error(errorText || `HTTP ${response.status}`);
                  }
              }
              
              const data = await response.json();
              console.log(`📡 Success Response:`, data);
              return data;
              
          } catch (error) {
              console.error('❌ API Error:', error);
              throw error;
          }
      }

      let loginTimeout;

      // ✅ Auto redirect if user already logged in
      document.addEventListener('DOMContentLoaded', function() {
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
          try {
            const parsed = JSON.parse(currentUser);
            if (parsed.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'all_book_grid.html';
            }
          } catch (e) {
            console.error('Error parsing user data:', e);
            localStorage.removeItem('currentUser');
            localStorage.removeItem('token');
          }
        }
      });

      async function handleLogin(event) {
        if (event) event.preventDefault(); // Prevent default form submission
        
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorMsg = document.getElementById('loginError');
        const successMsg = document.getElementById('loginSuccess');
        const loginBtn = document.getElementById('loginBtn');

        // Reset messages
        hideMessage(errorMsg);
        hideMessage(successMsg);

        // Validation
        if (!email || !password) {
          showError('Please enter both email and password.');
          return;
        }

        // Email validation
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        try {
          // Disable button and show loading
          loginBtn.disabled = true;
          loginBtn.textContent = 'Logging in...';

          console.log('🔍 Attempting login for:', email);
          
          const data = await apiCall('/auth/login', {
              method: 'POST',
              body: JSON.stringify({ email, password })
          });

          console.log('🔍 Login response:', data);

          // ✅ Save token and user info
          if (data.token && data.user) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));

            console.log('🔍 Token saved:', data.token.substring(0, 50) + '...');
            console.log('🔍 User saved:', data.user);

            // ✅ AUTO-LOGOUT TIMEOUT (10 minutes)
            if (window.loginTimeout) clearTimeout(window.loginTimeout);

            window.loginTimeout = setTimeout(() => {
              localStorage.removeItem('token');
              localStorage.removeItem('currentUser');
              alert('Session expired. Please login again.');
              window.location.href = 'login.html';
            }, 10 * 60 * 1000);

            showSuccess('Login successful! Redirecting...');

            // Redirect based on role
            setTimeout(() => {
              if (data.user.role === 'admin') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'all_book_grid.html';
              }
            }, 1000);
          } else {
            console.error('❌ Invalid response structure:', data);
            throw new Error('Invalid response from server');
          }

        } catch (err) {
          console.error('❌ Login error details:', {
            name: err.name,
            message: err.message,
            stack: err.stack
          });

          // Specific error messages for common issues
          if (err.message.includes('network') || err.message.includes('fetch')) {
            showError('Network error. Please check your connection.');
          } else if (err.message.includes('password') || err.message.includes('credentials')) {
            showError('Invalid email or password.');
          } else if (err.message.includes('no password set')) {
            showError('This account has no password set. Please sign up again or use password reset.');
          } else {
            showError(err.message || 'Something went wrong. Please try again.');
          }
        } finally {
          // Re-enable button
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      }

      function showError(message) {
        const errorMsg = document.getElementById('loginError');
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        // Auto-hide error after 5 seconds
        setTimeout(() => hideMessage(errorMsg), 5000);
      }

      function showSuccess(message) {
        const successMsg = document.getElementById('loginSuccess');
        successMsg.textContent = message;
        successMsg.style.display = 'block';
      }

      function hideMessage(element) {
        if (element) {
          element.style.display = 'none';
          element.textContent = '';
        }
      }

      // Clear error when user starts typing
      document.getElementById('loginEmail').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });
      
      document.getElementById('loginPassword').addEventListener('input', function() {
        hideMessage(document.getElementById('loginError'));
      });
  </script>

</body>
</html>
