<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shastraprathista</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center; 
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
      border: 1px solid #c3e6cb;
    }
    .signup-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .signup-link a {
      color: #007bff;
      text-decoration: none;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
    .guest-option {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 14px;
      color: #666;
    }
    .guest-option a {
      color: #007bff;
      text-decoration: none;
    }
    .guest-option a:hover {
      text-decoration: underline;
    }
    .forgot-password {
      text-align: center;
      margin: 15px 0;
      font-size: 14px;
    }
    .forgot-password a {
      color: #007bff;
      text-decoration: none;
    }
    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Welcome Back</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email Address" 
              autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Password" 
              autocomplete="current-password" required>
      </div>

      <button type="submit" id="loginBtn">Login</button>
    </form>

    <div class="forgot-password">
      <a href="forgot-password.html">Forgot your password?</a>
    </div>
    
    <div class="error" id="loginError"></div>
    <div class="success" id="loginSuccess"></div>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
    
    <div class="guest-option">
      Or <a href="chokkar-hall.html">continue as guest</a>
    </div>
  </div>

  <script>
    async function apiCall(endpoint, options = {}) {
      const url = `/api${endpoint}`;
      try {
        const response = await fetch(url, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          }
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          try {
            const errorJson = JSON.parse(errorText);
            throw new Error(errorJson.message || errorJson.error || `HTTP ${response.status}`);
          } catch (e) {
            throw new Error(errorText || `HTTP ${response.status}`);
          }
        }
        return await response.json();
      } catch (error) {
        console.error('❌ API Error:', error);
        throw error;
      }
    }

    let loginTimeout;

    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser) {
        try {
          const parsed = JSON.parse(currentUser);
          if (parsed.role === 'admin' || parsed.role === 'super_admin' || parsed.role === 'music-admin') {
            window.location.href = 'chokkar-hall.html';
          } else {
            window.location.href = 'chokar-hall.html';
          }
        } catch (e) {
          localStorage.removeItem('currentUser');
          localStorage.removeItem('token');
        }
      }
    });

    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorMsg = document.getElementById('loginError');
      const successMsg = document.getElementById('loginSuccess');
      const loginBtn = document.getElementById('loginBtn');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please enter both email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const data = await apiCall('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        if (data.token && data.user) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('currentUser', JSON.stringify(data.user));

          if (window.loginTimeout) clearTimeout(window.loginTimeout);
          window.loginTimeout = setTimeout(() => {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            alert('Session expired. Please login again.');
            window.location.href = 'login.html';
          }, 10 * 60 * 1000);

          successMsg.textContent = 'Login successful! Redirecting...';
          successMsg.style.display = 'block';

          setTimeout(() => {
            if (data.user.role === 'admin' || data.user.role === 'super_admin' || data.user.role === 'music-admin') {
              window.location.href = 'chokkar-hall.html';
            } else {
              window.location.href = 'chokkar-hall.html';
            }
          }, 1000);
        } else {
          throw new Error('Invalid response from server');
        }

      } catch (err) {
        errorMsg.textContent = err.message || 'Invalid email or password.';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    document.getElementById('loginEmail').addEventListener('input', function() {
      document.getElementById('loginError').style.display = 'none';
    });
    
    document.getElementById('loginPassword').addEventListener('input', function() {
      document.getElementById('loginError').style.display = 'none';
    });
  </script>
</body>
</html>
