<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Shastraprathista</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .signup-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
      max-width: 100%;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
      border: 1px solid #c3e6cb;
    }
    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .login-link a {
      color: #007bff;
      text-decoration: none;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
    .password-requirements {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create Your Account</h2>
    
    <form id="signupForm">
      <div class="form-group">
        <input type="text" id="signupName" placeholder="Full Name" required>
      </div>
      
      <div class="form-group">
        <input type="email" id="signupEmail" placeholder="Email Address" required>
      </div>
      
      <div class="form-group">
        <input type="tel" id="signupPhone" placeholder="Phone Number (10 digits)" pattern="[0-9]{10}" maxlength="10">
      </div>
      
      <div class="form-group">
        <input type="password" id="signupPassword" placeholder="Password (min. 6 characters)" minlength="6" required>
        <div class="password-requirements">Minimum 6 characters</div>
      </div>

      <button type="submit" id="signupBtn">Sign Up</button>
    </form>

    <div class="error" id="signupError"></div>
    <div class="success" id="signupSuccess"></div>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    async function apiCall(endpoint, options = {}) {
      const url = `/api${endpoint}`;
      try {
        const response = await fetch(url, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          }
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          try {
            const errorJson = JSON.parse(errorText);
            throw new Error(errorJson.message || errorJson.error || `HTTP ${response.status}`);
          } catch (e) {
            throw new Error(errorText || `HTTP ${response.status}`);
          }
        }
        return await response.json();
      } catch (error) {
        console.error('❌ API Error:', error);
        throw error;
      }
    }

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const password = document.getElementById('signupPassword').value;
      
      const errorMsg = document.getElementById('signupError');
      const successMsg = document.getElementById('signupSuccess');
      const signupBtn = document.getElementById('signupBtn');
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (!name || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (phone && !/^\d{10}$/.test(phone)) {
        errorMsg.textContent = 'Please enter a valid 10-digit phone number.';
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        signupBtn.disabled = true;
        signupBtn.textContent = 'Creating account...';
        
        const data = await apiCall('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({
            name,
            email,
            phone: phone || undefined,
            password
          })
        });
        
        successMsg.textContent = 'Account created successfully! Redirecting to login...';
        successMsg.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (err) {
        errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = 'Sign Up';
      }
    });
  </script>
</body>
</html>
