<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | Shastraprathista</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .signup-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 380px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
      position: relative;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
      border: 1px solid #f5c6cb;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
      border: 1px solid #c3e6cb;
    }
    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
    .login-link a {
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <h2>Create Your Account</h2>
    
    <form id="signupForm" onsubmit="handleSignup(event); return false;">
      <div class="form-group">
        <input type="text" id="signupName" placeholder="Full Name" 
              autocomplete="name" required>
      </div>
      
      <div class="form-group">
        <input type="email" id="signupEmail" placeholder="Email Address" 
              autocomplete="email" required>
      </div>
      
      <div class="form-group">
        <input type="tel" id="signupPhone" placeholder="Phone Number (10 digits)" 
              autocomplete="tel" required 
              pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number">
      </div>
      
      <div class="form-group">
        <input type="password" id="signupPassword" placeholder="Password (min. 6 characters)" 
              autocomplete="new-password" required 
              minlength="6">
      </div>
      
      <button type="submit" id="signupBtn">Sign Up</button>
    </form>
    
    <div class="error" id="signupError"></div>
    <div class="success" id="signupSuccess"></div>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
      // ================================
      // DYNAMIC BASE URL CONFIGURATION
      // ================================
      window.API_BASE_URL = window.location.origin;
      
      // ================================
      // IMPROVED API CALL FUNCTION
      // ================================
      async function apiCall(endpoint, options = {}) {
          // Use relative path (works on same origin)
          const url = `/api${endpoint}`;
          
          console.log(`📡 API Call: ${url}`, options);
          
          try {
              const response = await fetch(url, {
                  ...options,
                  headers: {
                      'Content-Type': 'application/json',
                      ...(options.headers || {})
                  }
              });
              
              console.log(`📡 Response Status: ${response.status}`);
              
              if (!response.ok) {
                  const errorText = await response.text();
                  console.error(`📡 Error Response:`, errorText);
                  
                  try {
                      const errorJson = JSON.parse(errorText);
                      throw new Error(errorJson.message || errorJson.error || `HTTP ${response.status}`);
                  } catch (e) {
                      throw new Error(errorText || `HTTP ${response.status}`);
                  }
              }
              
              const data = await response.json();
              console.log(`📡 Success Response:`, data);
              return data;
              
          } catch (error) {
              console.error('❌ API Error:', error);
              throw error;
          }
      }

      // Phone number validation
      document.getElementById('signupPhone').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length > 10) {
          this.value = this.value.slice(0, 10);
        }
      });

      async function handleSignup(event) {
        if (event) event.preventDefault();
        
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const phone = document.getElementById('signupPhone').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
      
        // Reset messages
        hideMessage(document.getElementById('signupError'));
        hideMessage(document.getElementById('signupSuccess'));

        // Validation
        if (!name || !email || !phone || !password) {
          showError('Please fill in all fields.');
          return;
        }

        if (name.length < 2) {
          showError('Please enter a valid name (at least 2 characters).');
          return;
        }

        if (!/^\d{10}$/.test(phone)) {
          showError('Please enter a valid 10-digit phone number.');
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        if (password.length < 6) {
          showError('Password must be at least 6 characters long.');
          return;
        }

        try {
          const signupBtn = document.getElementById('signupBtn');
          signupBtn.disabled = true;
          signupBtn.textContent = 'Creating Account...';

          // Direct signup - no OTP
          const result = await apiCall('/auth/signup', {
              method: 'POST',
              body: JSON.stringify({ name, email, phone, password })
          });
        
          if (result.success) {
            showSuccess('Account created successfully! Redirecting...');
          
            // Save token and user data
            localStorage.setItem('token', result.token);
            localStorage.setItem('currentUser', JSON.stringify(result.user));
          
            // Redirect to home page
            setTimeout(() => {
              window.location.href = 'all_book_grid.html';
            }, 2000);
          } else {
            showError(result.message || 'Signup failed');
          }
        } catch (error) {
          console.error('Signup error:', error);
          showError(error.message || 'Error creating account. Please try again.');
        } finally {
          const signupBtn = document.getElementById('signupBtn');
          signupBtn.disabled = false;
          signupBtn.textContent = 'Sign Up';
        }
      }

      function showError(message) {
        const errorMsg = document.getElementById('signupError');
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        setTimeout(() => hideMessage(errorMsg), 5000);
      }

      function showSuccess(message) {
        const successMsg = document.getElementById('signupSuccess');
        successMsg.textContent = message;
        successMsg.style.display = 'block';
      }

      function hideMessage(element) {
        if (element) {
          element.style.display = 'none';
          element.textContent = '';
        }
      }

      // Allow Enter key to submit
      document.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          handleSignup(event);
        }
      });

      // Clear error when user starts typing
      ['signupName', 'signupEmail', 'signupPhone', 'signupPassword'].forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
          hideMessage(document.getElementById('signupError'));
        });
      });
  </script>

</body>
</html>
