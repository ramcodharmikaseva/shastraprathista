<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Shastraprathista</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 380px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .error, .success {
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .error { 
      color: #721c24; 
      background: #f8d7da;
    }
    .success { 
      color: #155724; 
      background: #d4edda;
    }
    .timer {
      text-align: center;
      color: #e74c3c;
      font-weight: bold;
      margin: 10px 0;
    }
    .back-link {
      text-align: center;
      margin-top: 15px;
    }
    .back-link a {
      color: #007bff;
      text-decoration: none;
    }
    .resend-otp-btn {
      background: #28a745 !important;
      padding: 8px 15px !important;
      font-size: 14px !important;
      width: auto !important;
    }
    .resend-otp-btn:hover {
      background: #218838 !important;
    }
    .resend-otp-btn:disabled {
      background: #6c757d !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Reset Your Password</h2>
    
    <div id="requestSection">
      <p style="text-align: center; color: #666; margin-bottom: 20px;">
        Enter your email to receive OTP
      </p>
      
      <div class="form-group">
        <input type="email" id="resetEmail" placeholder="Enter your email address" required>
      </div>
      
      <button onclick="sendResetOTP()" id="sendResetOtpBtn">Send OTP</button>
    </div>
    
    <div id="otpSection" style="display: none;">
      <p style="text-align: center; color: #666; margin-bottom: 15px;">
        Enter the OTP sent to your email
      </p>
      
      <div class="form-group">
        <input type="text" id="resetOtp" placeholder="Enter 6-digit OTP" maxlength="6"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      </div>
      
      <div class="form-group">
        <input type="password" id="newPassword" placeholder="New Password (min. 6 characters)" required>
      </div>
      
      <div class="form-group">
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
      </div>
      
      <div id="resetTimer" class="timer">10:00</div>
      
      <button onclick="verifyResetOTP()" id="verifyResetOtpBtn">Reset Password</button>
      
      <div style="text-align: center; margin-top: 10px;">
        <button onclick="resendResetOTP()" id="resendResetOtpBtn" class="resend-otp-btn" disabled>
          Resend OTP (60s)
        </button>
      </div>
    </div>
    
    <div class="error" id="resetError"></div>
    <div class="success" id="resetSuccess"></div>
    
    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>
  </div>

  <script>
    // ================================
    // DYNAMIC BASE URL CONFIGURATION
    // ================================
    window.API_BASE_URL = window.location.origin;
    
    // Helper function for API calls
    async function apiCall(endpoint, options = {}) {
        const url = `${window.API_BASE_URL}/api${endpoint}`;
        console.log(`API Call: ${url}`);
        
        try {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                }
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            throw error;
        }
    }

    let resetTimer;
    let resetTimeLeft = 600; // 10 minutes
    let resendTimer;
    let resendTimeLeft = 60; // 60 seconds for resend
    let resetUserEmail = '';

    async function sendResetOTP() {
      const email = document.getElementById('resetEmail').value.trim();
      
      if (!email) {
        showResetError('Please enter your email address.');
        return;
      }

      // Email validation
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showResetError('Please enter a valid email address.');
        return;
      }

      try {
        const sendResetOtpBtn = document.getElementById('sendResetOtpBtn');
        sendResetOtpBtn.disabled = true;
        sendResetOtpBtn.textContent = 'Sending OTP...';

        // FIXED: Only send email (no phone option)
        const result = await apiCall('/auth/forgot-password-otp', {
          method: 'POST',
          body: JSON.stringify({ email })
        });
        
        if (result.success) {
          resetUserEmail = email;
          document.getElementById('requestSection').style.display = 'none';
          document.getElementById('otpSection').style.display = 'block';
          startResetTimer();
          startResendTimer();
          showResetSuccess('OTP sent to your email successfully!');
        } else {
          showResetError(result.message);
        }
      } catch (error) {
        console.error('Send reset OTP error:', error);
        showResetError('Error sending OTP. Please try again.');
      } finally {
        const sendResetOtpBtn = document.getElementById('sendResetOtpBtn');
        sendResetOtpBtn.disabled = false;
        sendResetOtpBtn.textContent = 'Send OTP';
      }
    }

    async function verifyResetOTP() {
      const otp = document.getElementById('resetOtp').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      
      if (!otp || otp.length !== 6) {
        showResetError('Please enter a valid 6-digit OTP.');
        return;
      }

      if (!newPassword || newPassword.length < 6) {
        showResetError('Password must be at least 6 characters long.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showResetError('Passwords do not match.');
        return;
      }

      try {
        const verifyResetOtpBtn = document.getElementById('verifyResetOtpBtn');
        verifyResetOtpBtn.disabled = true;
        verifyResetOtpBtn.textContent = 'Resetting...';

        // FIXED: Only send email (no phone option)
        const requestData = {
          email: resetUserEmail,
          otp,
          newPassword
        };

        const result = await apiCall('/auth/reset-password-otp', {
          method: 'POST',
          body: JSON.stringify(requestData)
        });
        
        if (result.success) {
          showResetSuccess('Password reset successfully! Redirecting to login...');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showResetError(result.message);
        }
      } catch (error) {
        console.error('Verify reset OTP error:', error);
        showResetError('Error resetting password. Please try again.');
      } finally {
        const verifyResetOtpBtn = document.getElementById('verifyResetOtpBtn');
        verifyResetOtpBtn.disabled = false;
        verifyResetOtpBtn.textContent = 'Reset Password';
      }
    }

    async function resendResetOTP() {
      try {
        const resendResetOtpBtn = document.getElementById('resendResetOtpBtn');
        resendResetOtpBtn.disabled = true;
        resendResetOtpBtn.textContent = 'Resending...';

        // FIXED: Only send email (no phone option)
        const result = await apiCall('/auth/forgot-password-otp', {
          method: 'POST',
          body: JSON.stringify({ email: resetUserEmail })
        });
        
        if (result.success) {
          showResetSuccess('OTP resent successfully!');
          clearInterval(resetTimer);
          clearInterval(resendTimer);
          resetTimeLeft = 600;
          resendTimeLeft = 60;
          startResetTimer();
          startResendTimer();
        } else {
          showResetError(result.message);
        }
      } catch (error) {
        console.error('Resend reset OTP error:', error);
        showResetError('Error resending OTP. Please try again.');
      }
    }

    function startResetTimer() {
      updateResetTimerDisplay();
      
      resetTimer = setInterval(() => {
        resetTimeLeft--;
        updateResetTimerDisplay();
        
        if (resetTimeLeft <= 0) {
          clearInterval(resetTimer);
          showResetError('OTP has expired. Please request a new one.');
        }
      }, 1000);
    }

    function startResendTimer() {
      const resendResetOtpBtn = document.getElementById('resendResetOtpBtn');
      resendResetOtpBtn.disabled = true;
      resendResetOtpBtn.textContent = `Resend OTP (${resendTimeLeft}s)`;
      
      resendTimer = setInterval(() => {
        resendTimeLeft--;
        resendResetOtpBtn.textContent = `Resend OTP (${resendTimeLeft}s)`;
        
        if (resendTimeLeft <= 0) {
          clearInterval(resendTimer);
          resendResetOtpBtn.disabled = false;
          resendResetOtpBtn.textContent = 'Resend OTP';
        }
      }, 1000);
    }

    function updateResetTimerDisplay() {
      const minutes = Math.floor(resetTimeLeft / 60);
      const seconds = resetTimeLeft % 60;
      document.getElementById('resetTimer').textContent = 
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function showResetError(message) {
      const errorMsg = document.getElementById('resetError');
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
      setTimeout(() => hideResetMessage(errorMsg), 5000);
    }

    function showResetSuccess(message) {
      const successMsg = document.getElementById('resetSuccess');
      successMsg.textContent = message;
      successMsg.style.display = 'block';
    }

    function hideResetMessage(element) {
      if (element) {
        element.style.display = 'none';
        element.textContent = '';
      }
    }

    // Allow Enter key submission
    document.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        if (document.getElementById('otpSection').style.display === 'block') {
          verifyResetOTP();
        } else {
          sendResetOTP();
        }
      }
    });

    // Clear error on input
    document.getElementById('resetEmail').addEventListener('input', function() {
      hideResetMessage(document.getElementById('resetError'));
    });
    
    document.getElementById('resetOtp').addEventListener('input', function() {
      hideResetMessage(document.getElementById('resetError'));
    });
    
    document.getElementById('newPassword').addEventListener('input', function() {
      hideResetMessage(document.getElementById('resetError'));
    });
    
    document.getElementById('confirmPassword').addEventListener('input', function() {
      hideResetMessage(document.getElementById('resetError'));
    });
  </script>

</body>
</html>
